name: modern_go
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  dartz: ^0.10.1
  
  # Networking
  dio: ^5.3.3
  pretty_dio_logger: ^1.3.1
  socket_io_client: ^2.0.3+1
  
  # Dependency Injection
  get_it: ^7.6.4
  
  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  
  # UI & Utilities
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  intl: ^0.19.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  image_picker: ^1.0.4
  local_auth: ^2.1.6
  
  # Geolocation & Camera
  geolocator: ^10.1.0
  camera: ^0.10.5+5
  permission_handler: ^11.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/designs/
